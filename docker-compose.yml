services:
  mysql:
    image: mysql:8.0
    container_name: suarabumi-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: suarabumi
      MYSQL_USER: suarabumi
      MYSQL_PASSWORD: suarabumi_dev
    volumes:
      - suarabumi_mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  suarabumi_mysql_data:
